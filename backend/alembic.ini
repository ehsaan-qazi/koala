[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Default database url (overridden by env.py)
sqlalchemy.url = postgresql+psycopg://koala:koala@localhost:5432/koala

[post_write_hooks]
# We can add ruff here in the future to format migrations

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
